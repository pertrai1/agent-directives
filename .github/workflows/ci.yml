name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  check:
    name: typecheck / validate / manifest / CLI tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Validate directives, skills, and eval scenarios
        run: npm run validate

      - name: Validate directive and skill version bumps
        run: npm run version:check -- --base origin/${{ github.base_ref || 'main' }}

      - name: Manifest drift check
        run: npm run manifest:check

      - name: CLI integration tests
        run: npm run test:cli

      - name: Version-bump validator tests
        run: npm run test:version-bumps

      - name: Package release configuration tests
        run: npm run test:package-release

      - name: Verify package contents
        run: npm run pack:check
